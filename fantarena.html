<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanter | fantarena</title>
  <link rel="stylesheet" href="config/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Whitney', 'Helvetica Neue', sans-serif; background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); min-height: 100vh; color: white; }
    .fantarena-container { display: flex; height: 100vh; width: 100%; }
    
    /* Sidebar */
    .sidebar { width: 280px; background: rgba(10, 15, 30, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(45, 90, 227, 0.3); display: flex; flex-direction: column; padding: 20px 0; }
    .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h2 { color: #ffcc00; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .server-list { padding: 15px; }
    .server-item { padding: 10px 15px; margin: 3px 0; border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
    .server-item:hover, .server-item.active { background: rgba(45, 90, 227, 0.3); color: white; }
    .server-item.active { border-left: 3px solid #ffcc00; }
    .friends-header { padding: 20px 20px 10px; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; }
    .add-friend-btn { background: none; border: none; color: #ffcc00; cursor: pointer; font-size: 18px; }
    .friend-item { padding: 8px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; border-radius: 8px; margin: 2px 10px; }
    .friend-item:hover { background: rgba(45, 90, 227, 0.2); }
    .friend-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .friend-info { flex: 1; }
    .friend-name { font-weight: 600; font-size: 14px; }
    .friend-status { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    .status-dot.offline { background: #666; }
    .status-dot.away { background: #ffcc00; }
    
    /* Main Chat */
    .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
    .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; }
    .chat-header h3 { font-family: 'Inter', sans-serif; font-weight: 700; color: #ffcc00; }
    .chat-header-info { color: rgba(255,255,255,0.5); font-size: 13px; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; align-items: flex-start; gap: 14px; position: relative; }
    .message:hover { background: rgba(255,255,255,0.02); }
    .message:hover .message-reactions { opacity: 1; }
    .message-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .message-content { flex: 1; }
    .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .message-name { font-weight: 700; color: #ffcc00; cursor: pointer; }
    .message-name:hover { text-decoration: underline; }
    .message-time { font-size: 11px; color: rgba(255,255,255,0.4); }
    .message-text { color: rgba(255,255,255,0.95); word-break: break-word; line-height: 1.4; }
    .message-reactions { display: flex; gap: 8px; margin-top: 6px; opacity: 0; transition: opacity 0.2s; }
    .reaction { background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; border: 1px solid transparent; }
    .reaction:hover { background: rgba(45,90,227,0.3); border-color: #ffcc00; }
    .reaction.active { background: rgba(45,90,227,0.4); border-color: #ffcc00; }
    .typing-indicator { padding: 8px 20px; color: rgba(255,255,255,0.4); font-size: 12px; font-style: italic; }
    .message-input-container { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    #messageInput { flex: 1; padding: 14px 18px; border-radius: 30px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
    #messageInput:focus { border-color: #ffcc00; }
    .send-btn { background: linear-gradient(135deg, #2d5ae3, #1a3a8a); border: none; border-radius: 30px; padding: 14px 28px; color: white; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(45,90,227,0.5); }
    
    /* Members Sidebar */
    .members-sidebar { width: 260px; background: rgba(10, 15, 30, 0.95); backdrop-filter: blur(10px); border-left: 1px solid rgba(45, 90, 227, 0.3); padding: 20px; }
    .members-header { margin-bottom: 20px; color: #ffcc00; font-weight: 700; display: flex; justify-content: space-between; }
    .member-category { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-transform: uppercase; margin: 15px 0 8px; }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; color: rgba(255,255,255,0.8); font-weight: 500; cursor: pointer; }
    .member-item:hover { color: white; }
    .member-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    
    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 20px; padding: 25px; max-width: 400px; width: 90%; }
    .modal h3 { color: #ffcc00; margin-bottom: 20px; }
    .modal input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; font-family: 'Inter', sans-serif; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>
  <div class="fantarena-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>🏟️ FANTARENA</h2>
      </div>
      <div class="server-list">
        <div class="server-item active" data-channel="general">
          <span>💬</span> general
        </div>
        <div class="server-item" data-channel="game-recs">
          <span>🎮</span> game-recs
        </div>
        <div class="server-item" data-channel="lfg">
          <span>👥</span> looking-for-group
        </div>
        <div class="server-item" data-channel="flex">
          <span>🏆</span> achievement-flex
        </div>
      </div>
      <div class="friends-header">
        <span>👥 friends</span>
        <button class="add-friend-btn" onclick="showAddFriendModal()">+</button>
      </div>
      <div id="friendsList"></div>
      <div style="margin-top: auto; padding: 20px;">
        <button onclick="window.location.href='index.html'" class="send-btn" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);">← back</button>
      </div>
    </div>
    
    <!-- Main Chat -->
    <div class="chat-main">
      <div class="chat-header">
        <h3 id="chatHeaderTitle"># general</h3>
        <span class="chat-header-info" id="chatHeaderInfo"></span>
      </div>
      <div class="messages-container" id="messagesContainer">
        <div style="text-align:center; color:rgba(255,255,255,0.4);">loading messages...</div>
      </div>
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="message-input-container">
        <input type="text" id="messageInput" placeholder="send a message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">send</button>
      </div>
    </div>
    
    <!-- Members Sidebar -->
    <div class="members-sidebar">
      <div class="members-header">
        <span>👥 members</span>
        <span id="onlineCount">0 online</span>
      </div>
      <div id="membersList"></div>
    </div>
  </div>

  <!-- Add Friend Modal -->
  <div class="modal-overlay" id="addFriendModal" onclick="if(event.target===this)closeAddFriendModal()">
    <div class="modal">
      <h3>add friend</h3>
      <input type="text" id="friendUsernameInput" placeholder="enter username">
      <div class="modal-buttons">
        <button class="send-btn" onclick="sendFriendRequest()" style="padding:10px 20px;">send request</button>
        <button class="send-btn" onclick="closeAddFriendModal()" style="padding:10px 20px; background:rgba(255,255,255,0.1);">cancel</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== SUPABASE SETUP =====
    const SUPABASE_URL = "https://gvzgnclowylrrpovdvtw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2emduY2xvd3lscnJwb3ZkdnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjM5ODEsImV4cCI6MjA5MjAzOTk4MX0.p7oeYBVX870iSK-TLDRj6pfW7wLj7HJsTHjNWaNpL7o";
    
    // Use fetch directly - bypass the broken cache
    async function fetchAPI(endpoint, options = {}) {
      const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
      const headers = {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        ...options.headers
      };
      
      const response = await fetch(url, { ...options, headers });
      if (!response.ok) {
        const error = await response.text();
        throw new Error(error);
      }
      return response.json();
    }
    
    console.log('✅ Fantarena API ready!');
    
    // ===== STATE =====
    let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    let currentChannel = 'general';
    let currentDM = null;
    let messages = [];
    let friends = [];
    
    if (!currentUser || currentUser.username === 'Guest') {
      alert('please log in to use fantarena!');
      window.location.href = 'fantaccount.html';
    }
    
    // ===== LOAD MESSAGES =====
    async function loadMessages() {
      console.log('📥 Loading messages...');
      
      let query = `fanter_chat?select=*&order=created_at.asc&limit=100`;
      
      if (currentDM) {
        query += `&or=(user_id.eq.${currentUser.id},user_id.eq.${currentDM})`;
      } else {
        query += `&channel_id=eq.${currentChannel}`;
      }
      
      try {
        const data = await fetchAPI(query);
        messages = data;
        console.log('✅ Loaded', messages.length, 'messages');
        renderMessages();
      } catch (error) {
        console.error('❌ Load error:', error);
      }
    }
    
    function renderMessages() {
      const container = document.getElementById('messagesContainer');
      if (messages.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4);">no messages yet. say something!</div>';
        return;
      }
      
      container.innerHTML = messages.map(msg => `
        <div class="message">
          <div class="message-avatar">${msg.username[0].toUpperCase()}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-name">${escapeHtml(msg.username)}</span>
              <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
            </div>
            <div class="message-text">${escapeHtml(msg.message)}</div>
          </div>
        </div>
      `).join('');
      
      container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // ===== SEND MESSAGE =====
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      
      const messageData = {
        user_id: currentUser.id,
        username: currentUser.displayName || currentUser.username,
        message: message,
        channel_id: currentDM ? `dm_${[currentUser.id, currentDM].sort().join('_')}` : currentChannel
      };
      
      console.log('📤 Sending message:', messageData);
      
      try {
        await fetchAPI('fanter_chat', {
          method: 'POST',
          body: JSON.stringify(messageData)
        });
        
        input.value = '';
        
        // Reload messages after a short delay
        setTimeout(() => loadMessages(), 300);
      } catch (error) {
        console.error('❌ Send error:', error);
        alert('failed to send: ' + error.message);
      }
    }
    
    // ===== CHANNEL SWITCHING =====
    document.querySelectorAll('.server-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentChannel = item.dataset.channel;
        currentDM = null;
        document.getElementById('chatHeaderTitle').textContent = `# ${currentChannel}`;
        document.getElementById('chatHeaderInfo').textContent = '';
        messages = [];
        loadMessages();
      });
    });
    
    // ===== MEMBERS LIST =====
    async function loadMembers() {
      try {
        const data = await fetchAPI('fanter_presence?select=*&order=status.desc');
        
        const online = data.filter(m => m.status === 'online').length;
        document.getElementById('onlineCount').textContent = `${online} online`;
        
        const container = document.getElementById('membersList');
        container.innerHTML = `
          <div class="member-category">online — ${online}</div>
          ${data.filter(m => m.status === 'online').map(m => `
            <div class="member-item">
              <div class="member-avatar">${m.username[0].toUpperCase()}</div>
              <span>${escapeHtml(m.username)}</span>
            </div>
          `).join('')}
          <div class="member-category">offline</div>
          ${data.filter(m => m.status !== 'online').map(m => `
            <div class="member-item">
              <div class="member-avatar">${m.username[0].toUpperCase()}</div>
              <span>${escapeHtml(m.username)}</span>
            </div>
          `).join('')}
        `;
      } catch (error) {
        console.error('Members error:', error);
      }
    }
    
    // ===== UPDATE PRESENCE =====
    async function updatePresence() {
      try {
        await fetchAPI(`fanter_presence?user_id=eq.${currentUser.id}`, {
          method: 'PATCH',
          body: JSON.stringify({
            user_id: currentUser.id,
            username: currentUser.displayName || currentUser.username,
            status: 'online',
            last_seen: new Date()
          })
        });
      } catch (e) {
        // Try insert if patch fails
        try {
          await fetchAPI('fanter_presence', {
            method: 'POST',
            body: JSON.stringify({
              user_id: currentUser.id,
              username: currentUser.displayName || currentUser.username,
              status: 'online',
              last_seen: new Date()
            })
          });
        } catch (e2) {
          console.error('Presence error:', e2);
        }
      }
    }
    
    // ===== FRIENDS =====
    async function loadFriends() {
      try {
        const data = await fetchAPI(`fanter_friends?select=friend_id&user_id=eq.${currentUser.id}`);
        
        if (data && data.length > 0) {
          const friendIds = data.map(f => f.friend_id).join(',');
          const friendsData = await fetchAPI(`fanter_presence?select=*&user_id=in.(${friendIds})`);
          friends = friendsData || [];
        } else {
          friends = [];
        }
        renderFriendsList();
      } catch (error) {
        console.error('Friends error:', error);
      }
    }
    
    function renderFriendsList() {
      const container = document.getElementById('friendsList');
      if (friends.length === 0) {
        container.innerHTML = '<div style="padding:20px;color:rgba(255,255,255,0.4);text-align:center;">no friends yet</div>';
        return;
      }
      
      container.innerHTML = friends.map(f => `
        <div class="friend-item" onclick="openDM('${f.user_id}', '${f.username}')">
          <div class="friend-avatar">${f.username[0].toUpperCase()}</div>
          <div class="friend-info">
            <div class="friend-name">${escapeHtml(f.username)}</div>
            <div class="friend-status">
              <span class="status-dot ${f.status || 'offline'}"></span>
              ${f.status || 'offline'}
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function openDM(userId, username) {
      currentDM = userId;
      currentChannel = null;
      document.getElementById('chatHeaderTitle').textContent = `@${username}`;
      document.getElementById('chatHeaderInfo').textContent = 'direct message';
      document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active'));
      messages = [];
      loadMessages();
    }
    
    function showAddFriendModal() {
      document.getElementById('addFriendModal').classList.add('show');
    }
    
    function closeAddFriendModal() {
      document.getElementById('addFriendModal').classList.remove('show');
      document.getElementById('friendUsernameInput').value = '';
    }
    
    async function sendFriendRequest() {
      const username = document.getElementById('friendUsernameInput').value.trim();
      if (!username) return alert('enter a username');
      
      try {
        const users = await fetchAPI(`fanter_presence?select=user_id,username&username=ilike.${username}`);
        
        if (!users || users.length === 0) {
          alert('user not found');
          return;
        }
        
        const friend = users[0];
        
        await fetchAPI('fanter_friend_requests', {
          method: 'POST',
          body: JSON.stringify({
            sender_id: currentUser.id,
            receiver_id: friend.user_id,
            status: 'pending'
          })
        });
        
        alert(`friend request sent to ${friend.username}!`);
        closeAddFriendModal();
      } catch (error) {
        alert('failed to send request');
      }
    }
    
    function showProfile(userId) {
      alert('Profile feature coming soon!');
    }
    
    // Make functions global
    window.sendMessage = sendMessage;
    window.showAddFriendModal = showAddFriendModal;
    window.closeAddFriendModal = closeAddFriendModal;
    window.sendFriendRequest = sendFriendRequest;
    window.showProfile = showProfile;
    window.openDM = openDM;
    
    // ===== INIT =====
    updatePresence();
    loadMessages();
    loadFriends();
    loadMembers();
    setInterval(loadMembers, 10000);
    setInterval(updatePresence, 30000);
    setInterval(loadMessages, 3000); // Poll for new messages
    
    console.log('🏟️ Fantarena loaded!');
  </script>
</body>
</html>

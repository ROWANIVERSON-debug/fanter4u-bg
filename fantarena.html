<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanter | fantarena</title>
  <link rel="stylesheet" href="config/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; color: white; transition: background 0.3s; }
    body.theme-dark { background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); }
    body.theme-light { background: linear-gradient(135deg, #f0f0f5, #e0e0ea, #d0d0e0); color: #1a1a2e; }
    body.theme-amoled { background: #000000; }
    body.theme-cyberpunk { background: linear-gradient(135deg, #0a0a2a, #1a0a3a, #2a0a4a); }
    .fantarena-container { display: flex; height: 100vh; width: 100%; }
    
    /* Sidebar */
    .sidebar { width: 280px; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(45,90,227,0.3); display: flex; flex-direction: column; padding: 20px 0; }
    body.theme-light .sidebar { background: rgba(255,255,255,0.9); border-right: 1px solid rgba(0,0,0,0.1); }
    .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .sidebar-header h2 { color: #ffcc00; font-weight: 700; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .theme-selector { margin-left: auto; background: rgba(255,255,255,0.1); border: none; border-radius: 20px; padding: 5px 10px; color: white; cursor: pointer; }
    .server-list { padding: 15px; }
    .server-item { padding: 10px 15px; margin: 3px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
    .server-item:hover, .server-item.active { background: rgba(45,90,227,0.3); color: white; }
    .server-item.active { border-left: 3px solid #ffcc00; }
    .pinned-messages { padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); max-height: 120px; overflow-y: auto; }
    .pinned-item { background: rgba(255,204,0,0.1); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .pinned-item span { color: #ffcc00; }
    
    /* Main Chat */
    .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
    .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    .chat-header h3 { font-weight: 700; color: #ffcc00; }
    .search-bar { margin-left: auto; display: flex; gap: 10px; }
    .search-bar input { padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; align-items: flex-start; gap: 14px; position: relative; }
    .message:hover { background: rgba(255,255,255,0.02); }
    .message:hover .message-actions { opacity: 1; }
    .message-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
    .message-content { flex: 1; }
    .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
    .message-name { font-weight: 700; cursor: pointer; }
    .message-time { font-size: 11px; color: rgba(255,255,255,0.4); }
    .mention { background: rgba(255,204,0,0.3); padding: 0 4px; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .message-text { color: rgba(255,255,255,0.95); word-break: break-word; line-height: 1.4; }
    .message-actions { display: flex; gap: 5px; position: absolute; right: 0; top: -10px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.3); border-radius: 20px; padding: 4px 8px; opacity: 0; }
    .message-action-btn { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 12px; padding: 2px 6px; }
    .message-action-btn:hover { background: rgba(45,90,227,0.3); color: white; }
    .thread-indicator { margin-top: 8px; font-size: 12px; color: #ffcc00; cursor: pointer; }
    
    /* Input Area */
    .message-input-container { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .input-row { display: flex; gap: 10px; align-items: center; }
    #messageInput { flex: 1; padding: 14px 18px; border-radius: 30px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; }
    .format-btn, .emoji-btn, .gif-btn, .poll-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 10px 15px; color: white; cursor: pointer; font-size: 18px; }
    .send-btn { background: linear-gradient(135deg, #2d5ae3, #1a3a8a); border: none; border-radius: 30px; padding: 14px 28px; color: white; font-weight: 600; cursor: pointer; }
    
    /* GIF Picker */
    .gif-picker { position: absolute; bottom: 100px; right: 20px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 15px; padding: 15px; display: none; width: 350px; max-height: 400px; overflow-y: auto; z-index: 100; }
    .gif-picker.show { display: block; }
    .gif-search { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; }
    .gif-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .gif-item { cursor: pointer; border-radius: 8px; overflow: hidden; }
    .gif-item img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Members Sidebar */
    .members-sidebar { width: 260px; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); border-left: 1px solid rgba(45,90,227,0.3); padding: 20px; }
    body.theme-light .members-sidebar { background: rgba(255,255,255,0.9); }
    
    /* Settings Panel */
    .settings-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 20px; padding: 25px; width: 400px; max-height: 80vh; overflow-y: auto; z-index: 1000; display: none; }
    .settings-panel.show { display: block; }
    .settings-panel h3 { color: #ffcc00; margin-bottom: 20px; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    
    /* Notifications */
    .notification-badge { position: fixed; bottom: 20px; right: 20px; background: #ff4444; color: white; padding: 12px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; z-index: 1000; animation: slideIn 0.3s; display: none; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Streak Badge */
    .streak-badge { display: inline-block; background: linear-gradient(135deg, #ff4400, #ff8800); padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-left: 8px; }
    
    /* Confetti Canvas */
    #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
  </style>
</head>
<body class="theme-dark">
<div class="fantarena-container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🏟️ FANTARENA</h2>
      <select class="theme-selector" onchange="setTheme(this.value)">
        <option value="dark">🌙 Dark</option>
        <option value="light">☀️ Light</option>
        <option value="amoled">⬛ AMOLED</option>
        <option value="cyberpunk">💜 Cyberpunk</option>
      </select>
    </div>
    <div class="server-list">
      <div class="server-item active" data-channel="general"><span>💬</span> general</div>
      <div class="server-item" data-channel="game-recs"><span>🎮</span> game-recs</div>
      <div class="server-item" data-channel="lfg"><span>👥</span> looking-for-group</div>
      <div class="server-item" data-channel="flex"><span>🏆</span> achievement-flex</div>
    </div>
    <div class="pinned-messages" id="pinnedMessages"><div style="color:rgba(255,255,255,0.4);font-size:11px;">📌 pinned messages</div><div id="pinnedList"></div></div>
    <div class="friends-header"><span>👥 friends</span><button class="add-friend-btn" onclick="showAddFriendModal()">+</button><span class="request-badge" id="requestBadge" style="display:none;" onclick="showRequestsModal()">0</span></div>
    <div id="friendsList"></div>
    <div class="friends-header" style="margin-top:10px;"><span>👥 groups</span><button class="add-friend-btn" onclick="showCreateGroupModal()">+</button></div>
    <div id="groupsList"></div>
    <div class="friends-header" style="margin-top:10px;"><span>🔖 saved</span></div>
    <div id="savedList"></div>
    <div style="margin-top: auto; padding: 20px;">
      <button onclick="window.location.href='index.html'" class="send-btn" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);">← back</button>
    </div>
  </div>
  
  <div class="chat-main">
    <div class="chat-header">
      <h3 id="chatHeaderTitle"># general</h3>
      <span class="chat-header-info" id="chatHeaderInfo"></span>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="search messages..." oninput="searchMessages(this.value)">
        <button class="format-btn" onclick="openSettings()">⚙️</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"><div style="text-align:center; color:rgba(255,255,255,0.4);">loading messages...</div></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="message-input-container">
      <div class="reply-bar" id="replyBar" style="display:none;"><span id="replyText">Replying to...</span><button onclick="cancelReply()">✕</button></div>
      <div class="input-row">
        <button class="format-btn" onclick="applyFormat('**')">B</button>
        <button class="format-btn" onclick="applyFormat('*')"><i>I</i></button>
        <button class="format-btn" onclick="applyFormat('~~')"><s>S</s></button>
        <button class="format-btn" onclick="applyFormat('`')">&lt;/&gt;</button>
        <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
        <button class="gif-btn" onclick="toggleGifPicker()">GIF</button>
        <button class="poll-btn" onclick="createPoll()">📊</button>
        <input type="text" id="messageInput" placeholder="send a message..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
        <button class="send-btn" onclick="sendMessage()">send</button>
      </div>
    </div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="gif-picker" id="gifPicker">
      <input type="text" class="gif-search" id="gifSearch" placeholder="search gifs..." oninput="searchGifs(this.value)">
      <div class="gif-grid" id="gifGrid"></div>
    </div>
  </div>
  
  <div class="members-sidebar">
    <div class="members-header"><span>👥 members</span><span id="onlineCount">0 online</span></div>
    <div id="membersList"></div>
    <button class="send-btn" onclick="showProfileModal()" style="width:100%; margin-top:20px; padding:10px;">edit profile</button>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <h3>⚙️ settings</h3>
  <div class="setting-item"><span>🔊 sound effects</span><input type="checkbox" id="soundToggle" checked onchange="toggleSound()"></div>
  <div class="setting-item"><span>🎨 name color</span><input type="color" id="nameColorPicker" value="#ffcc00" onchange="setNameColor(this.value)"></div>
  <div class="setting-item"><span>🔥 streak</span><span id="streakDisplay">0 days</span></div>
  <button class="send-btn" onclick="closeSettings()" style="width:100%; margin-top:20px;">close</button>
</div>

<div class="notification-badge" id="notificationBadge" onclick="openDMFromNotification()"></div>
<canvas id="confettiCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://tenor.googleapis.com/v2/search"></script>
<script>
// ===== SUPABASE =====
const SUPABASE_URL = "https://luxutkabqgitoteosctr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1eHV0a2FicWdpdG90ZW9zY3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2Mjc5NjAsImV4cCI6MjA5MjIwMzk2MH0.7GjvQMZaujg0YFmTBr2wotGWCIUoBWCBplGocMo6TDM";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TENOR_API_KEY = "AIzaSyDl5GXhX0Q5H8Z8Q5Z8Q5Z8Q5Z8Q5Z8Q5Z8"; // Replace with actual key

let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
let currentChannel = 'general', currentDM = null, currentGroup = null, messages = [], friends = [], groups = [], pinned = [], bookmarks = [];
let typingTimeout = null, typingUsers = new Map(), replyingTo = null, soundEnabled = true, nameColor = '#ffcc00';
let streak = parseInt(localStorage.getItem('fanter_streak') || '0');

if (!currentUser || currentUser.username === 'Guest') { alert('please log in!'); window.location.href = 'fantaccount.html'; }

// ===== THEMES =====
function setTheme(theme) {
  document.body.className = `theme-${theme}`;
  localStorage.setItem('fantarena_theme', theme);
}
const savedTheme = localStorage.getItem('fantarena_theme') || 'dark';
setTheme(savedTheme);
document.querySelector('.theme-selector').value = savedTheme;

// ===== STREAK =====
function updateStreak() {
  const lastLogin = localStorage.getItem('fanter_last_login') || new Date().toDateString();
  const today = new Date().toDateString();
  if (lastLogin !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (lastLogin === yesterday.toDateString()) { streak++; } else { streak = 1; }
    localStorage.setItem('fanter_streak', streak);
    localStorage.setItem('fanter_last_login', today);
  }
  document.getElementById('streakDisplay').textContent = `${streak} day${streak !== 1 ? 's' : ''}`;
}
updateStreak();

// ===== SOUNDS =====
const sounds = { send: new Audio('https://www.soundjay.com/misc/sounds/message-sent-1.mp3'), receive: new Audio('https://www.soundjay.com/misc/sounds/message-received-1.mp3'), ping: new Audio('https://www.soundjay.com/misc/sounds/ding-1.mp3') };
function playSound(type) { if (soundEnabled && sounds[type]) { sounds[type].volume = 0.3; sounds[type].play().catch(() => {}); } }
function toggleSound() { soundEnabled = document.getElementById('soundToggle').checked; }

// ===== MESSAGES =====
async function loadMessages() {
  let query = supabaseClient.from('fanter_chat').select('*').order('created_at', { ascending: true }).limit(100);
  if (currentDM) query = query.eq('channel_id', `dm_${[currentUser.id, currentDM].sort().join('_')}`);
  else if (currentGroup) query = query.eq('channel_id', `group_${currentGroup}`);
  else query = query.eq('channel_id', currentChannel);
  const { data } = await query;
  if (data) { messages = data; renderMessages(); }
}

function renderMessages() {
  const container = document.getElementById('messagesContainer');
  if (messages.length === 0) { container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4);">no messages yet. say something!</div>'; return; }
  container.innerHTML = messages.map(msg => {
    const isMe = msg.user_id === currentUser.id;
    const isMentioned = msg.message.includes(`@${currentUser.displayName}`) || msg.message.includes(`@${currentUser.username}`);
    if (isMentioned && !isMe) { playSound('ping'); showNotification(`@${msg.username} mentioned you`, msg.user_id); }
    return `<div class="message" style="${isMentioned ? 'background:rgba(255,204,0,0.1);border-left:3px solid #ffcc00;' : ''}">
      <div class="message-avatar" onclick="showProfile('${msg.user_id}')">${msg.username[0].toUpperCase()}</div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-name" style="color:${nameColor}" onclick="showProfile('${msg.user_id}')">${msg.username}</span>
          <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
          ${msg.edited ? '<span class="message-edited">(edited)</span>' : ''}
        </div>
        <div class="message-text">${formatMessage(msg.message)}</div>
        ${msg.reply_count ? `<div class="thread-indicator" onclick="viewThread('${msg.id}')">💬 ${msg.reply_count} replies</div>` : ''}
        <div class="message-actions">
          <button class="message-action-btn" onclick="replyToMessage('${msg.id}', '${msg.username}', '${msg.message.substring(0,30)}')">↩️</button>
          <button class="message-action-btn" onclick="bookmarkMessage('${msg.id}')">🔖</button>
          <button class="message-action-btn" onclick="pinMessage('${msg.id}')">📌</button>
          <button class="message-action-btn" onclick="inviteToGame('${msg.user_id}')">🎮</button>
          ${isMe ? `<button class="message-action-btn" onclick="editMessage('${msg.id}', \`${msg.message.replace(/`/g,'\\`')}\`)">✏️</button><button class="message-action-btn" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  return text.replace(/@(\w+)/g, '<span class="mention" onclick="openDMByName(\'$1\')">@$1</span>')
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>')
            .replace(/~~(.*?)~~/g, '<s>$1</s>').replace(/`(.*?)`/g, '<code>$1</code>');
}

async function sendMessage() {
  const input = document.getElementById('messageInput'); 
  let message = input.value.trim(); 
  if (!message) return;
  
  if (message.startsWith('/')) { handleCommand(message); input.value = ''; return; }
  
  const channelId = currentDM ? `dm_${[currentUser.id, currentDM].sort().join('_')}` : currentGroup ? `group_${currentGroup}` : currentChannel;
  await supabaseClient.from('fanter_chat').insert({ user_id: currentUser.id, username: currentUser.displayName || currentUser.username, message, channel_id: channelId, reply_to: replyingTo?.id || null });
  
  playSound('send');
  if (message.includes('🎉')) startConfetti();
  if (message.includes('🔥')) startFlames();
  
  input.value = ''; cancelReply(); clearTyping();
}

// ===== COMMANDS =====
function handleCommand(cmd) {
  const [command, ...args] = cmd.slice(1).split(' ');
  if (command === 'game' && args[0]) {
    const game = window.gamesData?.find(g => g.name.toLowerCase().includes(args.join(' ').toLowerCase()));
    document.getElementById('messageInput').value = game ? `🎮 Check out ${game.name}: ${window.location.origin}/play.html?gameurl=${encodeURIComponent(game.url)}` : `Game "${args.join(' ')}" not found`;
  } else if (command === 'roll') {
    const roll = Math.floor(Math.random() * 100) + 1;
    document.getElementById('messageInput').value = `🎲 rolled ${roll} (1-100)`;
  } else if (command === '8ball') {
    const answers = ['yes', 'no', 'maybe', 'ask again later', 'definitely', 'doubtful'];
    document.getElementById('messageInput').value = `🎱 ${answers[Math.floor(Math.random() * answers.length)]}`;
  } else if (command === 'stats') {
    const stats = currentUser.stats || {};
    document.getElementById('messageInput').value = `📊 Games: ${stats.gamesPlayed || 0} | ⭐ Ratings: ${stats.ratingsGiven || 0} | 🏆 Achievements: ${Object.keys(JSON.parse(localStorage.getItem('fanter_achievements')||'{}')).length}`;
  }
}

// ===== GIFS =====
async function searchGifs(query) {
  if (!query) return;
  const res = await fetch(`https://g.tenor.com/v1/search?q=${query}&key=${TENOR_API_KEY}&limit=10`);
  const data = await res.json();
  document.getElementById('gifGrid').innerHTML = data.results.map(g => `<div class="gif-item" onclick="sendGif('${g.media[0].gif.url}')"><img src="${g.media[0].tinygif.url}"></div>`).join('');
}
function sendGif(url) { document.getElementById('messageInput').value = url; sendMessage(); document.getElementById('gifPicker').classList.remove('show'); }
function toggleGifPicker() { document.getElementById('gifPicker').classList.toggle('show'); searchGifs('trending'); }

// ===== POLLS =====
function createPoll() {
  const question = prompt('Poll question:');
  if (!question) return;
  const options = prompt('Options (comma separated):')?.split(',').map(o => o.trim());
  if (!options) return;
  const pollText = `📊 ${question}\n${options.map((o, i) => `${i+1}. ${o}`).join('\n')}`;
  document.getElementById('messageInput').value = pollText;
}

// ===== PINNED & BOOKMARKS =====
async function pinMessage(msgId) {
  const msg = messages.find(m => m.id == msgId);
  if (!msg) return;
  await supabaseClient.from('fanter_pinned').insert({ channel_id: currentChannel, message_id: msgId, content: msg.message.substring(0, 100), username: msg.username });
  loadPinned();
}
async function loadPinned() {
  const { data } = await supabaseClient.from('fanter_pinned').select('*').eq('channel_id', currentChannel);
  pinned = data || [];
  document.getElementById('pinnedList').innerHTML = pinned.map(p => `<div class="pinned-item" onclick="scrollToMessage('${p.message_id}')"><span>📌</span> ${p.content}</div>`).join('');
}
function bookmarkMessage(msgId) {
  const msg = messages.find(m => m.id == msgId);
  if (!msg) return;
  bookmarks.push(msg);
  localStorage.setItem('fanter_bookmarks', JSON.stringify(bookmarks));
  loadBookmarks();
}
function loadBookmarks() {
  bookmarks = JSON.parse(localStorage.getItem('fanter_bookmarks') || '[]');
  document.getElementById('savedList').innerHTML = bookmarks.length ? bookmarks.map(b => `<div class="friend-item" onclick="scrollToMessage('${b.id}')">🔖 ${b.message.substring(0, 20)}</div>`).join('') : '<div style="padding:10px;color:rgba(255,255,255,0.4);">no bookmarks</div>';
}

// ===== SEARCH =====
function searchMessages(query) {
  if (!query) { renderMessages(); return; }
  const filtered = messages.filter(m => m.message.toLowerCase().includes(query.toLowerCase()));
  const container = document.getElementById('messagesContainer');
  container.innerHTML = filtered.map(msg => `<div class="message" style="opacity:0.7"><div class="message-avatar">${msg.username[0].toUpperCase()}</div><div class="message-content"><span class="message-name">${msg.username}</span> <span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span><div>${msg.message}</div></div></div>`).join('');
}

// ===== CONFETTI & FLAMES =====
let confettiActive = false;
function startConfetti() {
  if (confettiActive) return; confettiActive = true;
  const canvas = document.getElementById('confettiCanvas'), ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  let particles = Array(50).fill().map(() => ({ x: Math.random() * canvas.width, y: -20, s: 5 + Math.random() * 10, c: `hsl(${Math.random() * 360}, 80%, 60%)`, v: 3 + Math.random() * 5 }));
  function animate() {
    if (!confettiActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.y += p.v; if (p.y > canvas.height) p.y = -20; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s); });
    requestAnimationFrame(animate);
  }
  animate(); setTimeout(() => { confettiActive = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }, 3000);
}

// ===== GAME INVITES =====
function inviteToGame(userId) {
  const game = prompt('Enter game name:');
  if (!game) return;
  const gameData = window.gamesData?.find(g => g.name.toLowerCase().includes(game.toLowerCase()));
  const link = gameData ? `${window.location.origin}/play.html?gameurl=${encodeURIComponent(gameData.url)}` : '#';
  supabaseClient.from('fanter_chat').insert({ channel_id: `dm_${[currentUser.id, userId].sort().join('_')}`, user_id: currentUser.id, username: currentUser.displayName, message: `🎮 invited you to play ${gameData?.name || game}! ${link}` });
  playSound('ping');
}

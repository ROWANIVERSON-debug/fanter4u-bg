<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fanter v0.2</title>
    <link rel="stylesheet" href="config/main.css" />
    <script src="config/theme-loader.js"></script>
    <script src="config/main.js"></script>
  </head>

  <body>
    
<!-- Loadng Screen --->
<div id="loadingScreen">
  <canvas id="matrixCanvas"></canvas>
  <div class="matrix-scanlines"></div>
  <div id="brokenWallContainer"></div>
  <div class="loading-content">
    <div class="loading-icon"></div>
    <h1 class="loading-title">Loading fanter.OS</h1>
    <div class="loading-progress">
      <div class="loading-progress-bar"></div>
    </div>
    <p class="loading-status" id="loadingStatus">Initializing systems...</p>
  </div>
</div>

<div id="whiteFlash"></div>
<div id="revealOverlay"></div>
    <script>
      let lastKeyTime = 0;
      let lastKey = "";
      document.addEventListener("keydown", (e) => {
        const safetyKey = localStorage.getItem("safetyKey");
        const safetyUrl = localStorage.getItem("safetyUrl");
        if (!safetyKey || !safetyUrl) return;
        const now = Date.now();
        const pressedKey = e.key.toLowerCase();
        const storedKey = safetyKey.toLowerCase();
        if (pressedKey === storedKey && pressedKey === lastKey && now - lastKeyTime < 1000) {
          e.preventDefault();
          window.location.href = safetyUrl;
        }
        lastKey = pressedKey;
        lastKeyTime = now;
      });
    </script>
    
    <script>
      
      // ===== CUSTOM CURSOR WITH TrAIL =====
(function() {
  // Create main cursor orb
  const cursor = document.createElement('div');
  cursor.className = 'custom-cursor';
  document.body.appendChild(cursor);

  let trailPositions = [];
  const trailLength = 8;
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let cursorX = mouseX;
  let cursorY = mouseY;
  
  // Track mouse position
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    
    // Add position to trail array
    trailPositions.unshift({ x: mouseX, y: mouseY });
    if (trailPositions.length > trailLength) trailPositions.pop();
  });

  // Create trail dots
  function createTrailDots() {
    const existingTrails = document.querySelectorAll('.cursor-trail');
    existingTrails.forEach(trail => trail.remove());
    
    trailPositions.forEach((pos, index) => {
      if (index === 0) return; // Skip the first position (where main cursor is)
      
      const trail = document.createElement('div');
      trail.className = 'cursor-trail';
      
      // Calculate size and opacity based on position in trail
      const size = 10 - (index * 0.8);
      const opacity = 0.5 - (index * 0.05);
      
      trail.style.cssText = `
        left: ${pos.x}px;
        top: ${pos.y}px;
        width: ${Math.max(3, size)}px;
        height: ${Math.max(3, size)}px;
        background: ${index < 3 ? '#ffcc00' : '#2d5ae3'};
        opacity: ${Math.max(0.1, opacity)};
      `;
      
      document.body.appendChild(trail);
    });
  }

  // Smooth animation for main cursor
  function animateCursor() {
    // Smooth follow with easing
    cursorX += (mouseX - cursorX) * 0.25;
    cursorY += (mouseY - cursorY) * 0.25;
    cursor.style.left = cursorX + 'px';
    cursor.style.top = cursorY + 'px';
    
    // Update trail dots
    createTrailDots();
    
    requestAnimationFrame(animateCursor);
  }
  
  animateCursor();

  // Hover effect for all interactive elements
  function addHoverEffects() {
    const interactiveElements = document.querySelectorAll('a, button, .game, .settings-btn, .fav-btn, .theme-option-btn, .game img, #searchInput, .fav-sidebar-btn, .link');
    
    interactiveElements.forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.classList.add('hover');
      });
      el.addEventListener('mouseleave', () => {
        cursor.classList.remove('hover');
      });
    });
  }
  
  // Initial hover effects
  addHoverEffects();
  
  // Watch for dynamically added elements (like games)
  const observer = new MutationObserver(function(mutations) {
    addHoverEffects();
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Click animation and ripple
  document.addEventListener('click', (e) => {
    // Add click animation to cursor
    cursor.classList.add('click');
    setTimeout(() => {
      cursor.classList.remove('click');
    }, 150);
    
    // Create ripple effect
    const ripple = document.createElement('div');
    ripple.className = 'cursor-ripple';
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    ripple.style.animation = 'rippleAnim 0.4s ease-out forwards';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 400);
  });

  // Hide cursor when leaving window
  document.addEventListener('mouseleave', () => {
    cursor.style.opacity = '0';
    const trails = document.querySelectorAll('.cursor-trail');
    trails.forEach(trail => trail.style.opacity = '0');
  });
  
  document.addEventListener('mouseenter', () => {
    cursor.style.opacity = '1';
    const trails = document.querySelectorAll('.cursor-trail');
    trails.forEach(trail => trail.style.opacity = '1');
  });
  
  // Make sue cursor is visible on load
  setTimeout(() => {
    cursor.style.opacity = '1';
  }, 100);
  
  console.log('Custom cursor initialized!');
})();
    </script>
    
<script>
    // ===== LOADING SCREEN SYSTEM =====
(function() {
  // Add loading class to body
  document.body.classList.add('loading');
  
  const loadingScreen = document.getElementById('loadingScreen');
  const progressBar = document.querySelector('.loading-progress-bar');
  const statusEl = document.getElementById('loadingStatus');
  const whiteFlash = document.getElementById('whiteFlash');
  const revealOverlay = document.getElementById('revealOverlay');
  const brokenWallContainer = document.getElementById('brokenWallContainer');
  
  // ===== MATRIX RAIN =====
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');
  let width, height, drops = [];
  const fontSize = 16;
  const chars = "01";
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    const columns = Math.floor(width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) {
      drops.push(Math.random() * -height);
    }
  }
  
  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#00ff88';
    ctx.font = fontSize + 'px monospace';
    
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;
      ctx.fillText(text, x, y);
      if (y > height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  
  resizeCanvas();
  const matrixInterval = setInterval(drawMatrix, 50);
  window.addEventListener('resize', resizeCanvas);
  
  // ===== FALLING MATRIX CODE =====
  function createFallingCode() {
    const el = document.createElement('div');
    el.className = 'falling-matrix';
    const length = Math.floor(Math.random() * 20) + 10;
    let code = '';
    for (let i = 0; i < length; i++) {
      code += Math.random() > 0.5 ? '1' : '0';
    }
    el.textContent = code;
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (Math.random() * 10 + 10) + 'px';
    el.style.animationDuration = (Math.random() * 2 + 1) + 's';
    el.style.opacity = Math.random() * 0.5 + 0.3;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
  
  // ===== BROKEN WALL =====
  function createBrokenWall() {
    const wall = document.createElement('div');
    wall.className = 'broken-wall';
    wall.style.left = Math.random() * 100 + '%';
    wall.style.top = Math.random() * 100 + '%';
    wall.style.width = (Math.random() * 200 + 80) + 'px';
    wall.style.height = (Math.random() * 120 + 60) + 'px';
    if (Math.random() > 0.7) wall.classList.add('cracked');
    brokenWallContainer.appendChild(wall);
    setTimeout(() => wall.remove(), 800);
  }
  
  // ===== PROGRESS SIMULATION =====
  let progress = 0;
  const messages = [
    "Initializing fanter.OS...",
    "Loading core modules...",
    "Bypassing firewalls...",
    "Decrypting database...",
    "Loading games library...",
    "Applying themes...",
    "Hacking mainframe...",
    "Almost there...",
    "Starting fanter.OS..."
  ];
  let msgIndex = 0;
  
  // Start random effects
  const effectsInterval = setInterval(() => {
    if (progress < 100) {
      if (Math.random() > 0.7) createBrokenWall();
      if (Math.random() > 0.8) createFallingCode();
    }
  }, 500);
  
  // Progress update
  const progressInterval = setInterval(() => {
    progress += Math.random() * 8 + 2;
    if (progress >= 100) {
      progress = 100;
      clearInterval(progressInterval);
      clearInterval(effectsInterval);
      clearInterval(matrixInterval);
      progressBar.style.width = '100%';
      statusEl.textContent = "Complete! Starting fanter.OS...";
      
      // Wait for games to actually load
      waitForGamesToLoad();
    } else {
      progressBar.style.width = progress + '%';
      const newIndex = Math.floor(progress / 12);
      if (newIndex > msgIndex && newIndex < messages.length) {
        msgIndex = newIndex;
        statusEl.textContent = messages[msgIndex];
      }
    }
  }, 200);
  
  // ===== WAIT FOR ACTUAL GAMES TO LOAD =====
  function waitForGamesToLoad() {
    // Check if gamesData exists and has content
    const checkInterval = setInterval(() => {
      if (typeof gamesData !== 'undefined' && gamesData && gamesData.length > 0) {
        clearInterval(checkInterval);
        // Games are loaded, start transition
        startTransition();
      }
    }, 100);
    
    // Timeout after 5 seconds just in case
    setTimeout(() => {
      clearInterval(checkInterval);
      startTransition();
    }, 5000);
  }
  
  // ===== TRANSITION EFFECT =====
  function startTransition() {
    // White flash
    whiteFlash.style.opacity = '1';
    
    setTimeout(() => {
      // Hide loading screen
      loadingScreen.style.opacity = '0';
      
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        
        // Show reveal overlay
        revealOverlay.style.transform = 'scaleX(1)';
        
        setTimeout(() => {
          // Remove white flash
          whiteFlash.style.opacity = '0';
          
          // Show content
          document.body.classList.remove('loading');
          
          // Animate games
          animateGamesRandomly();
          
          // Animate UI elements
          animateUIElements();
          
          setTimeout(() => {
            revealOverlay.style.transform = 'scaleX(0)';
            setTimeout(() => {
              if (revealOverlay.parentNode) revealOverlay.remove();
              if (whiteFlash.parentNode) whiteFlash.remove();
            }, 1200);
          }, 500);
          
        }, 300);
      }, 400);
    }, 300);
  }
  
  // ===== RANDOM GAME APPEARANCE =====
  function animateGamesRandomly() {
    const games = document.querySelectorAll('.game');
    const gameArray = Array.from(games);
    
    // Shuffle array
    for (let i = gameArray.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [gameArray[i], gameArray[j]] = [gameArray[j], gameArray[i]];
    }
    
    gameArray.forEach((game, index) => {
      game.style.opacity = '0';
      game.style.transform = 'scale(0)';
      
      setTimeout(() => {
        game.style.opacity = '1';
        game.style.transform = 'scale(1)';
        game.style.animation = 'gamePop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
        setTimeout(() => {
          game.style.animation = '';
        }, 400);
      }, index * 40);
    });
  }
  
  // ===== SLIDE IN UI ELEMENTS =====
  function animateUIElements() {
    const elements = [
      { el: document.getElementById('searchInput'), dir: 'left', delay: 100 },
      { el: document.querySelector('.center .settings-btn'), dir: 'right', delay: 200 },
      { el: document.querySelector('.center h1'), dir: 'up', delay: 150 },
      { el: document.querySelector('.center p'), dir: 'up', delay: 250 },
      { el: document.querySelector('.fav-sidebar-btn'), dir: 'left', delay: 300 }
    ];
    
    elements.forEach(item => {
      if (!item.el) return;
      item.el.style.opacity = '0';
      if (item.dir === 'left') item.el.style.transform = 'translateX(-100px)';
      if (item.dir === 'right') item.el.style.transform = 'translateX(100px)';
      if (item.dir === 'up') item.el.style.transform = 'translateY(-30px)';
      item.el.style.transition = 'all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
      
      setTimeout(() => {
        item.el.style.opacity = '1';
        item.el.style.transform = 'translateX(0) translateY(0)';
      }, item.delay);
    });
  }
  
  // Block clicks on loading screen
  loadingScreen.addEventListener('click', (e) => {
    e.stopPropagation();
  });
  
  console.log('Loading screen active - waiting for games to load...');
})();
      </script>

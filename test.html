<!DOCTYPE html>
<html>
<head>
  <title>Test Game Loader</title>
</head>
<body>
  <h1>Game Test</h1>
  <p>Game URL: <span id="url"></span></p>
  <iframe id="gameFrame" width="100%" height="500" style="border:1px solid #ccc;"></iframe>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");
    const gameName = urlParams.get("game") || "Game";
    
    document.getElementById('url').textContent = gameUrl;
    document.getElementById('gameFrame').src = gameUrl;
    document.title = `Playing: ${gameName}`;
    
    console.log("Loading game URL:", gameUrl);
  </script>
</body>
</html>

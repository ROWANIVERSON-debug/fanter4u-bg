<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
      font-family: 'Ubuntu', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      background: rgba(10,15,30,0.95);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(45,90,227,0.3);
    }
    .game-title { color: #ffcc00; font-family: 'Orbitron', monospace; font-size: 18px; }
    button {
      background: rgba(20,30,50,0.8);
      border: 1px solid rgba(45,90,227,0.4);
      border-radius: 20px;
      padding: 6px 14px;
      color: white;
      cursor: pointer;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="game-title" id="gameTitle">Loading...</span>
    <button onclick="window.location.href='index.html'">← Back</button>
  </div>
  <iframe id="gameFrame" src="about:blank" allowfullscreen></iframe>

  <script>
    // Get the URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    
    // Decode the URL
    if (gameUrl) {
      gameUrl = decodeURIComponent(gameUrl);
    }
    const decodedName = decodeURIComponent(gameName);
    
    document.getElementById('gameTitle').textContent = decodedName;
    
    console.log("=== PLAY PAGE ===");
    console.log("Game:", decodedName);
    console.log("URL:", gameUrl);
    
    if (gameUrl && gameUrl !== 'null' && gameUrl !== 'undefined') {
      // DIRECTLY load the URL - no extra checks, no fallbacks
      const iframe = document.getElementById('gameFrame');
      iframe.src = gameUrl;
      console.log("✅ Iframe loading:", gameUrl);
    } else {
      console.error("❌ No game URL");
      document.body.innerHTML += '<div style="padding:40px;text-align:center;color:#ff4444;">❌ No game URL provided</div>';
    }
  </script>
</body>
</html>

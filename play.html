<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      min-height: 100vh;
      font-family: 'Ubuntu', sans-serif;
    }

    @keyframes bgShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* Main Layout */
    .game-layout {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* ===== SIDE MENU ===== */
    .game-sidebar {
      width: 280px;
      background: rgba(10, 15, 30, 0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(45, 90, 227, 0.3);
      display: flex;
      flex-direction: column;
      transition: width 0.3s ease;
      z-index: 100;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .game-sidebar.collapsed {
      width: 60px;
    }

    .sidebar-toggle {
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(45, 90, 227, 0.9);
      border: 1px solid rgba(255, 204, 0, 0.3);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      z-index: 101;
      transition: all 0.2s ease;
      color: white;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-toggle:hover {
      background: #ffcc00;
      color: #1a1a2e;
      transform: translateY(-50%) scale(1.1);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }

    .game-sidebar.collapsed .sidebar-header {
      padding: 20px 10px;
    }

    .sidebar-header h2 {
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      font-size: 18px;
    }

    .game-sidebar.collapsed .sidebar-header h2 {
      font-size: 0;
    }

    .game-sidebar.collapsed .sidebar-header h2::before {
      content: "🎮";
      font-size: 24px;
    }

    .sidebar-content {
      flex: 1;
      padding-bottom: 20px;
    }

    .game-sidebar.collapsed .sidebar-content {
      display: none;
    }

    /* Sidebar Cards */
    .sidebar-card {
      background: rgba(20, 30, 50, 0.6);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 16px;
      margin: 15px;
      padding: 15px;
      transition: all 0.2s ease;
    }

    .sidebar-card:hover {
      border-color: rgba(255, 204, 0, 0.3);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
    }

    .card-title {
      font-size: 12px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      margin-bottom: 10px;
      text-align: center;
    }

    .coin-amount {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      text-align: center;
    }

    .coin-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }

    .playtime-value {
      font-size: 20px;
      font-weight: bold;
      color: #2d5ae3;
      font-family: 'Orbitron', monospace;
      text-align: center;
    }

    .game-name-display {
      text-align: center;
      font-size: 14px;
      word-break: break-word;
      color: white;
    }

    .sidebar-btn {
      width: 100%;
      background: rgba(45, 90, 227, 0.2);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    .sidebar-btn:hover {
      background: rgba(45, 90, 227, 0.4);
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    /* ===== MAIN CONTENT AREA ===== */
    .game-main {
      flex: 1;
      margin-left: 280px;
      padding: 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: margin-left 0.3s ease;
    }

    .game-sidebar.collapsed ~ .game-main {
      margin-left: 60px;
    }

    /* Game Container */
    .game-container {
      width: 100%;
      max-width: 1100px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .game-header {
      background: rgba(10, 15, 30, 0.8);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(45, 90, 227, 0.3);
      flex-wrap: wrap;
      gap: 10px;
    }

    .game-name {
      font-size: 16px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }

    .game-controls {
      display: flex;
      gap: 10px;
    }

    .game-control-btn {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 20px;
      padding: 5px 12px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .game-control-btn:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .game-wrapper {
      aspect-ratio: 16 / 9;
      width: 100%;
      background: #000;
    }

    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .external-notice {
      text-align: center;
      padding: 8px;
      background: rgba(0,0,0,0.6);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* Loading Screen */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(45, 90, 227, 0.3);
      border-top: 3px solid #2d5ae3;
      border-right: 3px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #00ff88;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .loading-game-name {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      margin-top: 15px;
    }

    /* Error Message */
    .error-container {
      text-align: center;
      padding: 40px;
    }

    .error-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .error-title {
      font-size: 24px;
      color: #ff4444;
      margin-bottom: 10px;
    }

    .error-message {
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(45, 90, 227, 0.5);
      border-radius: 50%;
      animation: floatParticle 20s linear infinite;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    /* Scrollbar */
    .sidebar-content::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-content::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }

    .sidebar-content::-webkit-scrollbar-thumb {
      background: #2d5ae3;
      border-radius: 4px;
    }

    /* Fullscreen hint */
    .fullscreen-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      z-index: 1001;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .fullscreen-hint.show {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .game-sidebar {
        width: 240px;
      }
      .game-main {
        margin-left: 240px;
        padding: 20px;
      }
      .game-sidebar.collapsed {
        width: 50px;
      }
      .game-sidebar.collapsed ~ .game-main {
        margin-left: 50px;
      }
    }
  </style>
</head>
<body>
  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING GAME...</div>
    <div class="loading-game-name" id="loadingGameName">Preparing fanter player</div>
  </div>

  <!-- Fullscreen exit hint -->
  <div class="fullscreen-hint" id="fullscreenHint">press ESC or your safety key to exit fullscreen</div>

  <div class="game-layout">
    <!-- Side Menu -->
    <div class="game-sidebar" id="gameSidebar">
      <div class="sidebar-toggle" id="sidebarToggle">◀</div>
      
      <div class="sidebar-header">
        <h2>fanter</h2>
      </div>
      
      <div class="sidebar-content">
        <div class="sidebar-card">
          <div class="card-icon">🎮</div>
          <div class="card-title">now playing</div>
          <div class="game-name-display" id="gameNameDisplay">Loading...</div>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">🪙</div>
          <div class="card-title">your coins</div>
          <div class="coin-amount" id="coinAmount">0</div>
          <div class="coin-label">earned this session</div>
          <div class="coin-label" style="font-size: 9px;">+0.01 per second</div>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">⏱️</div>
          <div class="card-title">session time</div>
          <div class="playtime-value" id="playtimeDisplay">00:00:00</div>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">🛒</div>
          <div class="card-title">shop</div>
          <button class="sidebar-btn" id="shopBtn" onclick="alert('🪙 Shop coming soon!')">visit shop →</button>
        </div>
        
        <div class="sidebar-card">
          <div class="card-icon">🔗</div>
          <div class="card-title">links</div>
          <button class="sidebar-btn" onclick="window.location.href='index.html'">← back to games</button>
          <button class="sidebar-btn" onclick="window.location.href='fantaccount.html'">👤 my account</button>
        </div>
      </div>
    </div>
    
    <!-- Main Game Area -->
    <div class="game-main">
      <div class="game-container" id="gameContainer">
        <div class="game-header">
          <span class="game-name" id="gameTitle">Loading game...</span>
          <div class="game-controls">
            <button class="game-control-btn" id="fullscreenBtn">🖥️ fullscreen</button>
            <button class="game-control-btn" id="refreshBtn">🔄 refresh</button>
          </div>
        </div>
        <div class="game-wrapper">
          <iframe class="game-frame" id="gameFrame" src="about:blank" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
        </div>
        <div class="external-notice" id="externalNotice" style="display: none;">⚠️ external site - may not load in iframe</div>
      </div>
    </div>
  </div>

  <script>
    // ===== CREATE FLOATING PARTICLES =====
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = 15 + Math.random() * 15 + 's';
        particle.style.width = Math.random() * 4 + 1 + 'px';
        particle.style.height = particle.style.width;
        particle.style.background = `rgba(${45 + Math.random() * 50}, ${90 + Math.random() * 50}, ${227}, ${0.2 + Math.random() * 0.3})`;
        container.appendChild(particle);
      }
    }
    createParticles();

    // ===== GET GAME INFO FROM URL =====
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    const decodedGameName = decodeURIComponent(gameName);

    console.log("🔍 Game URL param:", gameUrl);
    console.log("📝 Game name:", decodedGameName);

    // Check if gameUrl is missing or empty
    if (!gameUrl || gameUrl === 'undefined' || gameUrl === 'null') {
      // Show error instead of loading game
      const loadingOverlay = document.getElementById('loadingOverlay');
      const gameContainer = document.getElementById('gameContainer');
      
      if (loadingOverlay) {
        loadingOverlay.innerHTML = `
          <div class="error-container">
            <div class="error-icon">😵</div>
            <div class="error-title">Game URL Not Found</div>
            <div class="error-message">The game URL could not be loaded. Please go back and try again.</div>
            <button class="sidebar-btn" onclick="window.location.href='index.html'" style="width: auto; padding: 10px 20px;">← back to games</button>
          </div>
        `;
        loadingOverlay.style.backgroundColor = 'rgba(0,0,0,0.95)';
      }
      
      if (gameContainer) gameContainer.style.opacity = '0';
      
      console.error("❌ No game URL provided!");
    } else {
      // Game URL exists - proceed normally
      const loadingGameNameEl = document.getElementById('loadingGameName');
      if (loadingGameNameEl) {
        loadingGameNameEl.textContent = `Loading ${decodedGameName}...`;
      }

      const isExternal = gameUrl && (gameUrl.startsWith('http://') || gameUrl.startsWith('https://'));
      
      let embedUrl;
      if (isExternal) {
        embedUrl = gameUrl;
      } else if (gameUrl) {
        embedUrl = `https://gms.parcoil.com/${gameUrl}`;
      } else {
        embedUrl = 'about:blank';
      }

      console.log("🎮 Embed URL:", embedUrl);

      const gameFrame = document.getElementById('gameFrame');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const gameContainer = document.getElementById('gameContainer');
      
      // When iframe loads, hide loading screen
      function onGameLoad() {
        console.log("✅ Game loaded successfully!");
        if (loadingOverlay) {
          loadingOverlay.classList.add('hide');
        }
      }
      
      // Set up iframe load event
      if (gameFrame) {
        gameFrame.onload = onGameLoad;
        gameFrame.src = embedUrl;
        
        // Fallback timeout
        setTimeout(() => {
          if (loadingOverlay && !loadingOverlay.classList.contains('hide')) {
            console.log("⚠️ Game load timeout, forcing hide");
            onGameLoad();
          }
        }, 8000);
      }
      
      // Update UI elements
      const gameTitle = document.getElementById('gameTitle');
      const gameNameDisplay = document.getElementById('gameNameDisplay');
      if (gameTitle) gameTitle.textContent = decodedGameName;
      if (gameNameDisplay) gameNameDisplay.textContent = decodedGameName;
      
      // Show external notice if needed
      if (isExternal) {
        const externalNotice = document.getElementById('externalNotice');
        if (externalNotice) externalNotice.style.display = 'block';
      }

      // ===== SIDEBAR COLLAPSE =====
      let sidebarCollapsed = localStorage.getItem('sidebarCollapsed_play') === 'true';
      const sidebar = document.getElementById('gameSidebar');
      const toggleBtn = document.getElementById('sidebarToggle');
      
      function toggleSidebar() {
        sidebarCollapsed = !sidebarCollapsed;
        localStorage.setItem('sidebarCollapsed_play', sidebarCollapsed);
        if (sidebarCollapsed) {
          sidebar.classList.add('collapsed');
          if (toggleBtn) toggleBtn.innerHTML = '▶';
        } else {
          sidebar.classList.remove('collapsed');
          if (toggleBtn) toggleBtn.innerHTML = '◀';
        }
      }
      
      if (toggleBtn) toggleBtn.onclick = toggleSidebar;
      
      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        if (toggleBtn) toggleBtn.innerHTML = '▶';
      }

      // ===== COIN & PLAYTIME SYSTEM =====
      let sessionStartTime = Date.now();
      let totalCoinsEarned = 0;
      let coinInterval = null;
      let currentUser = null;
      
      function loadUserData() {
        try {
          currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
          if (currentUser && currentUser.coins !== undefined) {
            totalCoinsEarned = currentUser.coins;
          }
          updateCoinDisplay();
        } catch(e) { console.error("Error loading user:", e); }
      }
      
      function saveUserCoins() {
        if (!currentUser) return;
        try {
          currentUser.coins = totalCoinsEarned;
          localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
          let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
          const userIndex = users.findIndex(u => u.id === currentUser.id);
          if (userIndex !== -1) {
            users[userIndex].coins = totalCoinsEarned;
            localStorage.setItem('fanter_users', JSON.stringify(users));
          }
        } catch(e) { console.error("Error saving coins:", e); }
      }
      
      function updateCoinDisplay() {
        const coinEl = document.getElementById('coinAmount');
        if (coinEl) {
          coinEl.textContent = Math.floor(totalCoinsEarned * 100) / 100;
        }
      }
      
      function updatePlaytimeDisplay() {
        const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const hours = Math.floor(elapsedSeconds / 3600);
        const minutes = Math.floor((elapsedSeconds % 3600) / 60);
        const seconds = elapsedSeconds % 60;
        const display = document.getElementById('playtimeDisplay');
        if (display) {
          display.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
      }
      
      function startCoinEarning() {
        if (coinInterval) clearInterval(coinInterval);
        coinInterval = setInterval(() => {
          if (!document.hidden) {
            totalCoinsEarned += 0.01;
            updateCoinDisplay();
            saveUserCoins();
          }
        }, 1000);
      }
      
      setInterval(updatePlaytimeDisplay, 1000);
      
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          if (coinInterval) clearInterval(coinInterval);
          coinInterval = null;
        } else {
          if (!coinInterval) startCoinEarning();
        }
      });
      
      loadUserData();
      startCoinEarning();
      
      window.addEventListener('beforeunload', () => {
        saveUserCoins();
      });
      
      // ===== FULLSCREEN TOGGLE =====
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const fullscreenHint = document.getElementById('fullscreenHint');
      let isFullscreen = false;
      let hintTimeout;
      
      function showFullscreenHint() {
        if (fullscreenHint) {
          fullscreenHint.classList.add('show');
          if (hintTimeout) clearTimeout(hintTimeout);
          hintTimeout = setTimeout(() => {
            fullscreenHint.classList.remove('show');
          }, 3000);
        }
      }
      
      function toggleFullscreen() {
        const gameContainerEl = document.getElementById('gameContainer');
        if (!isFullscreen) {
          gameContainerEl.classList.add('fullscreen');
          if (fullscreenBtn) fullscreenBtn.innerHTML = '⬛ exit';
          isFullscreen = true;
          showFullscreenHint();
        } else {
          gameContainerEl.classList.remove('fullscreen');
          if (fullscreenBtn) fullscreenBtn.innerHTML = '🖥️ fullscreen';
          isFullscreen = false;
        }
      }
      
      if (fullscreenBtn) fullscreenBtn.onclick = toggleFullscreen;
      
      // Escape key to exit fullscreen
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isFullscreen) {
          toggleFullscreen();
        }
      });
      
      // ===== SAFETY KEY TO EXIT FULLSCREEN =====
      let lastKeyTime = 0;
      let lastKey = "";
      
      function checkSafetyKeyExit(e) {
        if (!isFullscreen) return;
        
        const safetyKey = localStorage.getItem('safetyKey');
        if (!safetyKey) return;
        
        const now = Date.now();
        const pressedKey = e.key.toLowerCase();
        const storedKey = safetyKey.toLowerCase();
        
        if (pressedKey === storedKey && pressedKey === lastKey && now - lastKeyTime < 1000) {
          e.preventDefault();
          toggleFullscreen();
          const toast = document.createElement('div');
          toast.textContent = `🔑 Safety key pressed - exiting fullscreen`;
          toast.style.cssText = `
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #ffcc00;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 1002;
            animation: fadeOut 2s ease forwards;
          `;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 2000);
        }
        lastKey = pressedKey;
        lastKeyTime = now;
      }
      
      document.addEventListener('keydown', checkSafetyKeyExit);
      
      // ===== REFRESH BUTTON =====
      if (refreshBtn) {
        refreshBtn.onclick = () => {
          if (gameFrame) {
            if (loadingOverlay) {
              loadingOverlay.classList.remove('hide');
            }
            gameFrame.src = embedUrl;
          }
        };
      }
      
      // ===== TRACK GAME PLAY =====
      function trackGamePlay(gameNameParam) {
        if (typeof window.trackPlayedGame === 'function') {
          window.trackPlayedGame(gameNameParam);
        }
        if (typeof window.trackGamePlayCount === 'function') {
          window.trackGamePlayCount(gameNameParam);
        }
      }
      
      trackGamePlay(decodedGameName);
    }
    
    // Add fade out animation for toast
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeOut {
        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
        70% { opacity: 1; }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
      }
    `;
    document.head.appendChild(style);
    
    console.log('✅ Game player ready!');
  </script>
</body>
</html>

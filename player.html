<!DOCTYPE html>
<html>
<head>
  <title>Game Player</title>
  <style>
    body { margin: 0; padding: 0; background: #0a0a1a; }
    iframe { width: 100%; height: 100vh; border: none; }
    .info { position: fixed; bottom: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="info" id="info">Loading...</div>
  <iframe id="gameFrame" src="about:blank"></iframe>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    
    document.getElementById('info').innerHTML = `Game: ${decodeURIComponent(gameName)}<br>URL: ${gameUrl}`;
    
    if (gameUrl && gameUrl !== 'null' && gameUrl !== 'undefined') {
      document.getElementById('gameFrame').src = gameUrl;
      console.log("Loading game:", gameUrl);
    } else {
      document.getElementById('info').innerHTML = "ERROR: No game URL!";
    }
  </script>
</body>
</html>
